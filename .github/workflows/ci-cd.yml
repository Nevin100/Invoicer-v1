name: Invoicer CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Type Checking 
  # Ensures code quality and type safety before proceeding to build and deploy steps.
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # Job 2: Build Check
  # Makes sure the Next.js app builds cleanly
  build-check:
    name: Next.js Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Create dummy .env for build
        run: |
          cat <<EOF > .env.local
          MONGODB_URI=mongodb://localhost:27017/dummy
          GOOGLE_CLIENT_ID=dummy
          GOOGLE_CLIENT_SECRET=dummy
          JWT_SECRET=dummysecretdummysecretdummysecret32
          RESEND_API_KEY=re_dummy
          GOOGLE_REDIRECT_URI=http://localhost:3000/api/auth/google/callback
          EMAIL_USER=dummy@dummy.com
          EMAIL_PASS=dummy
          UPSTASH_REDIS_REST_URL=https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN=dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_test_dummy
          RAZORPAY_KEY_SECRET=dummy
          RAZORPAY_WEBHOOK_SECRET=dummy
          INVOICER_COUPONS=DUMMY100:100
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=production
          EOF

      - name: Build Next.js app
        run: npm run build

  # Job 3: Docker Build & Push to Docker Hub
  # Only runs on push to main (not PRs.)
  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/invoicer
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/invoicer:buildcache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/invoicer:buildcache,mode=max

